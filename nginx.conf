##############################################################
# Metabook – Nginx reverse proxy config
# Place at: /etc/nginx/sites-available/metabook
# Then: sudo ln -s /etc/nginx/sites-available/metabook /etc/nginx/sites-enabled/
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo nginx -t && sudo systemctl reload nginx
##############################################################

server {
    listen 80;
    server_name metabook-dz.com www.metabook-dz.com;

    # Allow large uploads for PDF print requests (max 30 MB)
    client_max_body_size 35M;

    # All traffic → Node.js (Express serves both API and React static files)
    location / {
        proxy_pass          http://127.0.0.1:4000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  120s;
    }
}
